name: Daily Puzzle

# Generates the day's NBA mini crossword and commits it to main.
#
# Trigger: 10:00 UTC daily — that's 06:00 ET in summer (EDT, UTC-4) and
# 05:00 ET in winter (EST, UTC-5). The plan accepts this DST drift for v0.
# Manual dispatch is also available for backfills and recovery.
#
# LLM auth: clue generation runs Claude on Amazon Bedrock. The runner has no
# AWS SSO session, so we assume an IAM role via GitHub's OIDC provider — no
# long-lived keys in secrets. The role ARN lives in the repo variable
# AWS_BEDROCK_ROLE_ARN; one-time AWS-side setup is documented in
# compound-engineering/reference/bedrock-oidc-setup.md.

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "ISO date (YYYY-MM-DD) for the slate to ingest. Empty = yesterday in US/Eastern."
        required: false
        default: ""
      force:
        description: "Overwrite an existing puzzle file for that date."
        required: false
        type: boolean
        default: false

# contents:write — push the freshly generated puzzle JSON back to main.
# id-token:write — mint the OIDC token used to assume the Bedrock IAM role.
permissions:
  contents: write
  id-token: write

# A manual dispatch should never race the cron. We don't cancel an in-flight
# run — we'd rather queue and let the running generation finish.
concurrency:
  group: daily-puzzle
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          # Required so the final `git push` reuses GITHUB_TOKEN credentials.
          persist-credentials: true

      # Preflight: fail loudly with an actionable message if the OIDC role
      # variable is missing. Without this, configure-aws-credentials dies with
      # the cryptic "Could not load credentials from any providers" — which is
      # what masked the real cause (the AWS-side IAM setup was never done; see
      # compound-engineering/reference/bedrock-oidc-admin-handoff.md).
      - name: Preflight — Bedrock role variable is set
        run: |
          if [ -z "${{ vars.AWS_BEDROCK_ROLE_ARN }}" ]; then
            echo "::error::AWS_BEDROCK_ROLE_ARN repo variable is unset. The Bedrock OIDC role"
            echo "::error::has not been created/wired yet. Run the admin handoff:"
            echo "::error::compound-engineering/reference/bedrock-oidc-admin-handoff.md"
            exit 1
          fi

      - name: Configure AWS credentials (Bedrock via OIDC)
        # v6 runs on Node 24 — past the v4 Node-20 deprecation (forced
        # migration 2026-06-16). Latest major as of 2026-06.
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Short-lived session; the daily run finishes well within an hour.
          role-session-name: nba-mini-daily-puzzle

      - name: Set up uv (with Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          # Pipeline pyproject.toml requires-python = ">=3.12". Pin explicitly
          # so a future uv default change doesn't silently move us off 3.12.
          python-version: "3.12"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: uv sync --extra dev

      - name: Generate today's puzzles (both leagues)
        working-directory: pipeline
        env:
          # Drive the pipeline onto Bedrock. AWS_REGION and the OIDC-assumed
          # role credentials are already in the environment.
          NBA_MINI_LLM_BACKEND: bedrock
        run: |
          set -uo pipefail
          ARGS=()
          if [ -n "${{ inputs.date }}" ]; then
            ARGS+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          # Generate for both leagues. Each looks back to its own most recent
          # slate, so an off-day for one league doesn't block the other. The
          # CLI appends the league subdir under --out, so these write to
          # ../puzzles/nba/ and ../puzzles/wnba/ respectively.
          #
          # Per-league isolation: a transient failure for one league (Bedrock
          # blip, nba.com 5xx) must NOT abort the other league. We deliberately
          # drop `-e` and track failures ourselves, then fail the step at the
          # end so the run still goes red and alerts us — but only after every
          # league has had its shot. (A no-games day is exit 0, not a failure.)
          rc=0
          for league in nba wnba; do
            echo "::group::generate ${league}"
            if ! uv run python -m nba_mini.generate \
                 --league "${league}" --backend bedrock --out ../puzzles "${ARGS[@]}"; then
              echo "::error::${league} crossword generation failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "${rc}"

      - name: Generate today's Spelling Bees (both leagues)
        working-directory: pipeline
        # Run even if the crossword step failed: the Bee is corpus-driven and
        # shares nothing with the crossword (no games, no LLM, no Bedrock), so
        # a crossword outage must not drop the Bees. `!cancelled()` still skips
        # this on a manual run cancellation.
        if: ${{ !cancelled() }}
        run: |
          set -uo pipefail
          # The Bee is corpus-driven, not news-driven: no games, no LLM, no
          # look-back. It just needs a date (seed) and the names corpus, so it
          # runs independently of the crossword and of Bedrock. Writes to
          # ../puzzles/<league>/bee/<date>.json.
          ARGS=()
          if [ -n "${{ inputs.date }}" ]; then
            ARGS+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          # Per-league isolation, same rationale as the crossword step.
          rc=0
          for league in nba wnba; do
            echo "::group::bee ${league}"
            if ! uv run python -m nba_mini.bee.generate_cli \
                 --league "${league}" --out ../puzzles "${ARGS[@]}"; then
              echo "::error::${league} Bee generation failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "${rc}"

      - name: Commit and push if new puzzles were written
        # Commit whatever landed even if a generation step failed for one
        # league — a partial success (e.g. WNBA wrote, NBA errored) should
        # still ship the WNBA puzzle rather than discarding it. The step that
        # failed has already turned the run red.
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain puzzles/)" ]; then
            echo "No puzzle changes in puzzles/ — likely a no-games day for both leagues, or an idempotent re-run. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add puzzles/
          STAGED="$(git diff --name-only --cached -- 'puzzles/**/*.json')"
          if [ -z "$STAGED" ]; then
            echo "puzzles/ changed but no JSON file was staged — refusing to commit."
            exit 1
          fi
          # Recover the date from a staged JSON filename (puzzles live under
          # puzzles/<league>/<date>.json and .../<league>/bee/<date>.json).
          # Works for cron runs and workflow_dispatch backfills alike.
          DATE="$(basename "$(echo "$STAGED" | head -n 1)" .json)"
          # Describe which leagues actually changed, so an off-day or a
          # single-league failure doesn't claim "nba + wnba" misleadingly.
          LEAGUES="$(echo "$STAGED" | sed -E 's#puzzles/([^/]+)/.*#\1#' | sort -u | paste -sd '+' -)"

          git commit -m "chore(puzzles): add ${DATE} (${LEAGUES})"
          git push
